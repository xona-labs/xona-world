<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Xona World — Signing Cockpit</title>
<style>
  :root { --glass: rgba(255,255,255,0.045); --border: rgba(255,255,255,0.09); --text:#f2f2f2; --text2:#9a9a9a; --text3:#5c5c5c; }
  body { margin:0; background:#060607; color:var(--text); font:14px/1.5 -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif; }
  .shell { max-width:1200px; margin:0 auto; padding:24px; }
  h1 { font-size:16px; letter-spacing:.18em; text-transform:uppercase; }
  h1 span { opacity:.5; }
  .card { background:var(--glass); border:1px solid var(--border); border-radius:14px; padding:16px; margin-bottom:14px; backdrop-filter:blur(20px); }
  .row { display:flex; gap:10px; align-items:center; font-size:13px; color:var(--text2); flex-wrap:wrap; }
  .pill { border:1px solid var(--border); border-radius:999px; padding:4px 12px; font-size:12px; }
  .pill b { color:var(--text); }
  .slots { display:grid; grid-template-columns:repeat(3,1fr); gap:12px; }
  .slot { border:1px solid var(--border); border-radius:12px; overflow:hidden; background:rgba(255,255,255,0.02); min-height:300px; position:relative; }
  .slot .tag { position:absolute; top:8px; left:10px; z-index:2; font:10.5px ui-monospace,Menlo,monospace; color:var(--text3); background:rgba(0,0,0,0.6); padding:2px 8px; border-radius:6px; max-width:90%; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .slot iframe { width:100%; height:340px; border:0; display:block; }
  .slot .idle { display:flex; align-items:center; justify-content:center; height:340px; color:var(--text3); font-size:12px; }
  #log { font:11.5px/1.6 ui-monospace,Menlo,monospace; color:var(--text3); max-height:240px; overflow-y:auto; white-space:pre-wrap; }
  #log .err { color:#c96b6b; }
  #log .ok { color:#e8e8e8; }
</style>
</head>
<body>
<div class="shell">
  <h1>XONA <span>WORLD</span> — signing cockpit</h1>
  <div class="card">
    <div class="row">
      <span class="pill">key <b id="key-state">loading…</b></span>
      <span class="pill">queue <b id="queue-state">0</b></span>
      <span class="pill">signed <b id="done-state">0</b></span>
      <span class="pill">failed <b id="fail-state">0</b></span>
    </div>
    <p style="color:var(--text3);font-size:12.5px;margin:10px 0 0">
      Keep this tab open and in the foreground. Trades sign in parallel across the three slots below — nothing to click.
    </p>
  </div>
  <div class="card"><div class="slots" id="slots"></div></div>
  <div class="card"><div id="log"></div></div>
</div>
<script>
const SLOT_COUNT = 3;
const MAX_AGE_MS = 3 * 60_000; // don't bother signing stale parks
const logEl = document.getElementById('log');
const state = { queue: [], seen: new Set(), done: 0, fail: 0 };

function log(msg, cls) {
  const line = document.createElement('div');
  if (cls) line.className = cls;
  line.textContent = `${new Date().toLocaleTimeString('en-US', { hour12: false })}  ${msg}`;
  logEl.prepend(line);
  while (logEl.childNodes.length > 250) logEl.removeChild(logEl.lastChild);
}
function setPill(id, v) { document.getElementById(id).textContent = v; }
function report(text) {
  fetch('/api/cockpit/report', {
    method: 'POST', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ text }),
  }).catch(() => {});
}

async function installKey() {
  try {
    const r = await fetch('/api/cockpit/key');
    if (!r.ok) throw new Error((await r.json()).error || r.status);
    const k = await r.json();
    localStorage.setItem('paybox.walletSign.creds.v2',
      JSON.stringify({ apiPubHex: k.apiPubHex, apiPrivHex: k.apiPrivHex, savedAt: Date.now() }));
    setPill('key-state', 'installed');
  } catch (err) {
    setPill('key-state', 'MISSING');
    log(`signing key unavailable: ${err.message}`, 'err');
  }
}

// ---- slots -----------------------------------------------------------------
const slots = Array.from({ length: SLOT_COUNT }, (_, i) => {
  const el = document.createElement('div');
  el.className = 'slot';
  el.innerHTML = `<div class="tag" id="tag-${i}">idle</div><div class="idle">idle</div>`;
  document.getElementById('slots').appendChild(el);
  return { i, el, frame: null, request: null, appReady: false, lastText: '' };
});

function slotBydSource(src) {
  return slots.find((s) => s.frame && s.frame.contentWindow === src);
}

function mount(slot, request) {
  slot.request = request;
  slot.appReady = false;
  slot.lastText = '';
  slot.el.querySelector('.idle')?.remove();
  slot.frame?.remove();
  slot.frame = document.createElement('iframe');
  slot.frame.src = '/api/cockpit/app';
  slot.el.appendChild(slot.frame);
  document.getElementById(`tag-${slot.i}`).textContent =
    `${request.agent_id} · ${request.side?.toUpperCase()} $${request.usd} · ${(request.market_title || '').slice(0, 26)}`;
}

function unmount(slot) {
  slot.frame?.remove();
  slot.frame = null;
  slot.request = null;
  slot.appReady = false;
  document.getElementById(`tag-${slot.i}`).textContent = 'idle';
  if (!slot.el.querySelector('.idle')) {
    const idle = document.createElement('div');
    idle.className = 'idle';
    idle.textContent = 'idle';
    slot.el.appendChild(idle);
  }
}

// ---- MCP-Apps host bridge --------------------------------------------------
window.addEventListener('message', async (ev) => {
  const slot = slotBydSource(ev.source);
  if (!slot) return;
  const msg = ev.data;
  if (!msg || msg.jsonrpc !== '2.0') return;
  const reply = (payload) => slot.frame?.contentWindow.postMessage({ jsonrpc: '2.0', id: msg.id, ...payload }, '*');

  if (msg.method === 'ui/initialize') {
    reply({ result: {
      protocolVersion: msg.params?.protocolVersion || '2025-11-21',
      hostInfo: { name: 'xona-world-cockpit', version: '0.2.0' },
      hostCapabilities: {},
      hostContext: { theme: 'dark' },
    }});
  } else if (msg.method === 'ui/notifications/initialized') {
    slot.appReady = true;
    if (slot.request) {
      slot.frame.contentWindow.postMessage({ jsonrpc: '2.0', method: 'ui/notifications/tool-input', params: { arguments: {} } }, '*');
      slot.frame.contentWindow.postMessage({
        jsonrpc: '2.0', method: 'ui/notifications/tool-result',
        params: { content: [{ type: 'text', text: JSON.stringify(slot.request.op) }] },
      }, '*');
    }
  } else if (msg.method === 'tools/call') {
    try {
      const r = await fetch('/api/cockpit/call', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name: msg.params?.name, arguments: msg.params?.arguments || {} }),
      });
      const result = await r.json();
      if (result.error) throw new Error(result.error);
      reply({ result });
    } catch (err) {
      reply({ error: { code: -32000, message: String(err.message) } });
    }
  } else if (msg.id != null && msg.method) {
    reply({ result: {} });
  }
});

// ---- queue + supervision ---------------------------------------------------
async function pollPending() {
  try {
    const r = await fetch('/api/cockpit/pending');
    const { pending } = await r.json();
    for (const p of pending) {
      if (!state.seen.has(p.request_id) && p.op?.refresh_url) {
        state.seen.add(p.request_id);
        state.queue.push(p);
      }
    }
  } catch {}
  setPill('queue-state', state.queue.length);
}

async function requestStatus(requestId) {
  try {
    const r = await fetch('/api/cockpit/call', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name: 'get_request', arguments: { request_id: requestId } }),
    });
    const result = await r.json();
    const text = result?.content?.find((c) => c.type === 'text')?.text;
    return text ? (JSON.parse(text).status || null) : null;
  } catch { return null; }
}

async function runSlot(slot, request) {
  mount(slot, request);
  log(`slot ${slot.i}: ${request.request_id.slice(0, 8)} — ${request.agent_id} ${request.side?.toUpperCase()} $${request.usd}`);
  const startedAt = Date.now();
  while (Date.now() - startedAt < 170_000) {
    await new Promise((res) => setTimeout(res, 5_000));
    const status = await requestStatus(request.request_id);
    if (status && !status.startsWith('pending')) {
      const ok = status === 'success';
      log(`slot ${slot.i}: ${request.request_id.slice(0, 8)} → ${status}`, ok ? 'ok' : 'err');
      if (ok) { state.done += 1; setPill('done-state', state.done); }
      else { state.fail += 1; setPill('fail-state', state.fail); }
      fetch('/api/cockpit/mark', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ request_id: request.request_id, status }),
      }).catch(() => {});
      break;
    }
  }
  unmount(slot);
}

setInterval(() => {
  for (const slot of slots) {
    if (slot.request) continue;
    let next;
    for (;;) {
      next = state.queue.shift();
      if (!next) break;
      if (Date.now() - next.ts <= MAX_AGE_MS) break;
      log(`skip stale ${next.request_id.slice(0, 8)}`);
    }
    if (!next) break;
    runSlot(slot, next).catch((err) => { log(`slot ${slot.i} error: ${err.message}`, 'err'); unmount(slot); });
  }
}, 2_000);

// Mirror each slot's visible app text to the log + server.
setInterval(() => {
  for (const slot of slots) {
    if (!slot.frame) continue;
    try {
      const text = (slot.frame.contentDocument?.body?.innerText || '').trim().replace(/\s+/g, ' ').slice(0, 200);
      if (text && text !== slot.lastText) {
        slot.lastText = text;
        log(`slot ${slot.i} app: ${text}`);
        report(`[slot ${slot.i}] ${text}`);
      }
    } catch {}
  }
}, 4_000);

// Heartbeat for the headless watchdog.
setInterval(() => { window.__cockpitBeat = Date.now(); }, 5_000);

(async () => {
  await installKey();
  setInterval(pollPending, 3_000);
  log('cockpit online — parallel signing across 3 slots');
})();
</script>
</body>
</html>
